name: Create GitHub release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[a-c][0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+alpha[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+beta[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

permissions: {}


jobs:
  create-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: gh release create "${GH_REF_NAME}" --draft --title "${GH_REF_NAME}"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REF_NAME: ${{ github.ref_name }}

  build:
    runs-on: ${{ matrix.os }}
    needs: create-release-draft
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest, macos-15-intel, macos-26-intel]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11

      - name: Build fractal-web components
        run: |
          pixi run clone-fractal-web
          cd fractal-web-clone/components && npm install --omit=peer

      - name: Build frontend
        run: pixi run build-frontend

      - name: Build executable
        run: pixi run build-executable

      - name: Set artifact suffix (Windows)
        run: echo "artifact_suffix=.exe" >> "$GITHUB_ENV"
        if: runner.os == 'Windows'

      - name: Print artifact suffix
        run: echo "artifact suffix is ${artifact_suffix}"
        env:
          artifact_suffix: ${{ env.artifact_suffix }}

      - name: Rename artifact
        run: mv "dist/fractal${artifact_suffix}" "dist/fractal-${GH_REF_NAME}-${MATRIX_OS}${artifact_suffix}"
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          MATRIX_OS: ${{ matrix.os }}
          artifact_suffix: ${{ env.artifact_suffix }}

      - name: Test artifact
        run: |
          chmod +x "dist/fractal-${GH_REF_NAME}-${MATRIX_OS}${artifact_suffix}"
          ./dist/fractal-${GH_REF_NAME}-${MATRIX_OS}${artifact_suffix}
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          MATRIX_OS: ${{ matrix.os }}
          artifact_suffix: ${{ env.artifact_suffix }}
        timeout-minutes: 1
        continue-on-error: true

      - run: gh release upload "${GH_REF_NAME}" "dist/fractal-${GH_REF_NAME}*"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REF_NAME: ${{ github.ref_name }}

  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: gh release edit "${GH_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REF_NAME: ${{ github.ref_name }}
